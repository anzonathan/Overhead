<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Overhead</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <span id="mobile-clock"></span>
  <button id="mobile-toggle" title="Cycle View" onclick="cycleMobileView()">
    <span id="mobile-toggle-icon">○</span>
  </button>

  <!-- Discrete sidebar -->
  <aside id="sidebar">
    <div style="padding: 0 16px; margin-bottom: 28px; height: 26px; display:flex; align-items:center; justify-content:center;">
      <span class="sb-brand">oh</span>
    </div>
    <nav id="sb-nav">
      <a href="#" class="sb-link active" data-view="today">
        <span class="sb-icon">○</span><span class="sb-tooltip">Today</span>
      </a>
      <a href="#" class="sb-link" data-view="week">
        <span class="sb-icon">‖</span><span class="sb-tooltip">Week</span>
      </a>
      <a href="#" class="sb-link" data-view="month">
        <span class="sb-icon">▦</span><span class="sb-tooltip">Month</span>
      </a>
      <a href="#" class="sb-link" data-view="goals">
        <span class="sb-icon">≡</span><span class="sb-tooltip">Goals</span>
      </a>
    </nav>
    <div class="sb-bottom">
      <span class="sb-time" id="sb-clock"></span>
    </div>
  </aside>

  <!-- Main content -->
  <div id="app">
    <main id="view"></main>
  </div>

  <!-- FAB -->
  <button id="fab" title="Add item">+</button>

  <!-- Dynamic Modal (bottom sheet) -->
  <div id="add-modal">
    <div class="modal-card" style="position:relative">
      <button class="modal-close" id="modal-close">×</button>
      <h3 id="modal-title">New Item</h3>
      <input class="modal-input" id="modal-input" autocomplete="off" placeholder="What needs doing?" />
      
      <!-- Container for dynamic select fields -->
      <div class="modal-row" id="modal-fields">
        <!-- Fields injected by JS -->
      </div>
      <div style="display:flex; justify-content:flex-end; margin-top:16px;">
        <button id="modal-submit" class="modal-submit">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
