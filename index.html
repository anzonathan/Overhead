<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overhead</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Discrete sidebar -->
  <aside id="sidebar">
    <span class="sb-brand">oh</span>
    <nav id="sb-nav">
      <a class="sb-link active" data-view="today">
        ○
        <span class="sb-tooltip">Today</span>
      </a>
      <a class="sb-link" data-view="week">
        ▦
        <span class="sb-tooltip">Week</span>
      </a>
      <a class="sb-link" data-view="goals">
        ≡
        <span class="sb-tooltip">Goals</span>
      </a>
    </nav>
    <div class="sb-bottom">
      <span class="sb-time" id="sb-clock"></span>
    </div>
  </aside>

  <!-- Main content -->
  <div id="app">
    <main id="view"></main>
  </div>

  <!-- FAB -->
  <button id="fab" title="Add task">+</button>

  <!-- Add task modal (bottom sheet) -->
  <div id="add-modal">
    <div class="modal-card" style="position:relative">
      <button class="modal-close" id="modal-close">×</button>
      <h3>New task</h3>
      <input class="modal-input" id="modal-input" placeholder="What needs doing?" />
      <div class="modal-row">
        <select class="modal-select" id="modal-bucket">
          <option value="must">[ must ]</option>
          <option value="should" selected>[ should ]</option>
          <option value="backlog">[ backlog ]</option>
        </select>
        <button class="modal-submit" id="modal-submit">Add</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
